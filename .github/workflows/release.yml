name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  publish-cli:
    name: Publish CLI to npm
    runs-on: ubuntu-latest
    needs: ci
    environment: npm

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 22.x
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: packages/cli/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: packages/cli

      - name: Build
        run: npm run build
        working-directory: packages/cli

      - name: Publish
        run: npm publish --provenance --access public
        working-directory: packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [publish-cli]

    steps:
      - uses: actions/checkout@v6

      - name: Extract release notes from CHANGELOG
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract the section for this version from CHANGELOG.md
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md 2>/dev/null || echo "Release ${GITHUB_REF_NAME}")
          if [ -z "$NOTES" ]; then
            NOTES="Release ${GITHUB_REF_NAME}"
          fi
          # Write to file to preserve multiline content
          echo "$NOTES" > /tmp/release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: /tmp/release-notes.md
          generate_release_notes: true

  sync-plugin-repo:
    name: Sync Plugin Marketplace
    runs-on: ubuntu-latest
    needs: [publish-cli]

    steps:
      - uses: actions/checkout@v6

      - name: Build and push plugin directory
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          # Clone plugin repo
          git clone https://x-access-token:${{ secrets.PLUGIN_REPO_TOKEN }}@github.com/r-bart/devtronic-plugin.git /tmp/plugin-repo
          cd /tmp/plugin-repo

          PLUGIN_DIR="plugins/devtronic"

          # Update skills and agents from templates
          rm -rf "$PLUGIN_DIR/skills" "$PLUGIN_DIR/agents"
          cp -r "$GITHUB_WORKSPACE/packages/cli/templates/claude-code/.claude/skills" "$PLUGIN_DIR/"
          cp -r "$GITHUB_WORKSPACE/packages/cli/templates/claude-code/.claude/agents" "$PLUGIN_DIR/"

          # Update hooks and scripts from marketplace templates
          cp "$GITHUB_WORKSPACE/packages/cli/templates/marketplace/hooks.json" "$PLUGIN_DIR/hooks/"
          cp "$GITHUB_WORKSPACE/packages/cli/templates/marketplace/stop-guard.sh" "$PLUGIN_DIR/scripts/"
          cp "$GITHUB_WORKSPACE/packages/cli/templates/marketplace/auto-lint.sh" "$PLUGIN_DIR/scripts/"
          cp "$GITHUB_WORKSPACE/packages/cli/templates/marketplace/checkpoint.sh" "$PLUGIN_DIR/scripts/"
          chmod +x "$PLUGIN_DIR/scripts/"*.sh

          # Update plugin.json version (count skills and agents dynamically)
          SKILL_COUNT=$(find "$PLUGIN_DIR/skills" -mindepth 1 -maxdepth 1 -type d | wc -l | tr -d ' ')
          AGENT_COUNT=$(find "$PLUGIN_DIR/agents" -name '*.md' | wc -l | tr -d ' ')
          jq -n \
            --arg version "$VERSION" \
            --arg desc "Agentic development toolkit — ${SKILL_COUNT} skills, ${AGENT_COUNT} agents, workflow hooks" \
            '{
              name: "devtronic",
              version: $version,
              description: $desc,
              author: {
                name: "r-bart",
                url: "https://github.com/r-bart/devtronic"
              },
              homepage: "https://github.com/r-bart/devtronic",
              repository: "https://github.com/r-bart/devtronic-plugin",
              license: "MIT"
            }' > "$PLUGIN_DIR/.claude-plugin/plugin.json"

          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to sync"
          else
            git commit -m "chore: sync v${VERSION} from devtronic CLI"
            git tag "v${VERSION}"
            git push origin main
            git push origin "v${VERSION}"
          fi
